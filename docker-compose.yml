services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - INSTANCE_URL=${INSTANCE_URL:-http://localhost:3000}
      - DATABASE_URL=postgresql://backyard:backyard@db:5432/backyard
      - SESSION_SECRET=${SESSION_SECRET:-change-me-to-a-random-secret-at-least-32-characters-long!!}
      - OAUTH_PRIVATE_KEY_1=${OAUTH_PRIVATE_KEY_1:-}
      - OAUTH_PRIVATE_KEY_2=${OAUTH_PRIVATE_KEY_2:-}
      - OAUTH_PRIVATE_KEY_3=${OAUTH_PRIVATE_KEY_3:-}
      - JETSTREAM_URL=${JETSTREAM_URL:-}
      - FIREHOSE_DISABLED=${FIREHOSE_DISABLED:-}
      - BODY_SIZE_LIMIT=${BODY_SIZE_LIMIT:-52428800}
      - SIGNUP_MODE=${SIGNUP_MODE:-open}
      - ADMIN_DIDS=${ADMIN_DIDS:-}
      - RELAY_URL=${RELAY_URL:-}
      - HANDLE_RESOLVER_URL=${HANDLE_RESOLVER_URL:-}
      - NEWS_DID=${NEWS_DID:-}
      - NEWS_HANDLE=${NEWS_HANDLE:-}
      - TOS_PATH=${TOS_PATH:-/data/legal/terms_of_service.md}
      - COMMUNITY_GUIDELINES_PATH=${COMMUNITY_GUIDELINES_PATH:-/data/legal/community_guidelines.md}
      - BLOB_CACHE_DIR=${BLOB_CACHE_DIR:-/data/blob-cache}
      - BLOB_CACHE_MAX_BYTES=${BLOB_CACHE_MAX_BYTES:-2147483648}
      - CAPTCHA_PDS_ALLOWLIST=${CAPTCHA_PDS_ALLOWLIST:-}
    volumes:
      - blobcache:/data/blob-cache
      - ./legal:/data/legal:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_USER: backyard
      POSTGRES_PASSWORD: backyard
      POSTGRES_DB: backyard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backyard"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  blobcache:
